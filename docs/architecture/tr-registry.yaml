    gdd: design/gdd/item-definition-system.md
    requirement: "stack_policy/max_stack_size 必须明确；equipment Phase 1 non-stackable。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-009
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "equipment item 必须有 equipment data block，但 Item Definition 不决定 equip legality。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-010
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "Phase 1 modifier payload 仅允许 add_flat，目标必须是 Character Attributes modifier-targetable stat，禁止 current resources。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-011
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "source/evidence labels 必填；openmir2_verified 必须有 E3/E4 evidence ref。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-012
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "definition validation 必须覆盖 identity、display、stack、type、equipment、evidence，失败时不得 spawnable。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-013
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "runtime truth 必须 normalized DTO/table，.tres 只可作为 authoring envelope。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-014
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "下游必须通过 status-bearing query/projection results 消费定义，不得读 raw authoring rows。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-015
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "deprecated definitions 不可删除或静默 remap；save/debug/migration 需显式策略。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-016
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "MVP provisional item set 至少含 baseline、upgrade、sidegrade/weaker、stackable material，可选 rare showcase。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-017
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "Drop Table、Drop/Pickup、Inventory、Equipment、Attributes、UI、Save/Load 的边界必须遵守 Item Definition source-of-truth。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-018
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "公式/验证必须覆盖 stack_quantity_valid、modifier_payload_row_valid、modifier_payload_valid、lookup、semantic validity、profile eligibility、spawn eligibility。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-019
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "正常 gameplay/UI lookup 不得全扫 authoring rows 或每次重跑全验证；需 validated indexed runtime data。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-020
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "实现前需要 Item Definition ADR 覆盖 data representation、validation result schema、version/migration boundary、authoring pipeline。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-item-definition-021
    system: item-definition
    gdd: design/gdd/item-definition-system.md
    requirement: "Item UI projection 必须提供 fallback/status keys，且 accessibility metadata 不得只依赖颜色/icon。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-001
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Drop Table 必须拥有 reward source → drop table mapping、roll groups、weights、no-drop policy、quantity policy、validation、deterministic roll results 和 QA replay provenance。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-002
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Drop Table 不得拥有 item template truth、ground drop lifecycle、map placement、pickup、inventory receive、equipment legality、UI/VFX/audio 或 final item instance identity。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-003
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Every item row 必须通过 Item Definition spawn_eligible_reference 与 stack/equipment quantity constraints 验证。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-004
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Drop Table 必须使用 deterministic weighted selection、inclusive RNG convention、deterministic quantity roll、exact boundary behavior 和 expected acquisition formulas。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-005
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Drop Table 必须把非证据支持的 rates/items 标记为 mvp_provisional，并阻止缺少 ADR-0016 accepted readiness 的 openmir2_verified claims。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-drop-table-006
    system: drop-table
    gdd: design/gdd/drop-table-system.md
    requirement: "Phase 1 QA 必须使用 fake RNG、exact boundary tests、deterministic fixtures 和真实 Godot GDScript test runner；guard-only runner 不可作为 passing evidence。"
    created: 2026-06-05
    revised: ""
    status: active


  - id: TR-click-movement-001
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "点击移动必须使用 named input action，并在同一输入事件上通过 UI/input gate 后才允许世界投影；UI-consumed 或 unknown ownership 必须 fail closed。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-002
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "所有点击坐标必须通过 MapProjection 转换为 logical Vector2i candidate；点击移动不得本地转换或 fallback 到最近格、上一格或 (0,0)。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-003
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "Phase 1 允许远端点击 destination，但实际执行必须拆为 orthogonal-only 单步；diagonal step、corner-cutting、cross-map movement 保持 unresolved/evidence-gated。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-004
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "每个 movement step 必须通过 MovementLegalityService read-only preflight，然后通过 MapSpaceState RESERVE_MOVEMENT / COMMIT_MOVEMENT / CANCEL_MOVEMENT mutation authority。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-005
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "无效、阻挡、no-path replacement click 不得取消当前有效 movement；MovingStep 中 valid replacement 作为 pending destination，当前 step commit 后从新 committed cell 重规划。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-006
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "Path query 必须返回 typed path-found/no-path/path-limit/unresolved result DTO，包含 ordered path cells、budget facts、canonical reasons 和 deterministic tie-break evidence。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-007
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "点击移动不得使用 Godot Navigation、Physics、TileMapLayer、Node2D position 或 Y-sort 作为 movement gameplay authority。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-008
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "Movement speed、path search budgets 和 MVP policy knobs 必须数据驱动；invalid speed/path budget config 必须 fail validation，不得硬编码或 silent clamp。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-009
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "移动反馈必须 typed、可区分 invalid/same-cell/blocked/reserved/no-path/command failure/unresolved；玩家反馈不得只依赖颜色或音频。"
    created: 2026-06-05
    revised: ""
    status: active

  - id: TR-click-movement-010
    system: click-movement
    gdd: design/gdd/click-movement-system.md
    requirement: "点击移动 public logic 必须通过 testable dependencies/adapters 消费 projection、legality、map state、planner、tuning、actor/status facts；direct singleton-only core logic 不可作为 Done。"
    created: 2026-06-05
    revised: ""
    status: active
