    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: loose_dictionary_attribute_config_authority
    status: active
    description: "Raw JSON, Dictionary, Variant graphs, or Dictionary-only fixture maps must not be authoritative Character Attributes runtime config schema."
    why: "Loose containers are mutable, weakly typed, iteration-order sensitive, and unsafe after external decode; config must be typed and validated before use."
    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_config_hot_path_reload
    status: active
    description: "Character Attributes formula/runtime hot paths must not reload or re-normalize full config through FileAccess, ResourceLoader, JSON parse, or live config scans."
    why: "Config normalization belongs to bootstrap/test setup or explicit update flows; gameplay rebuilds should use validated injected tables and preserve O(M + S) behavior."
    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: provisional_value_without_source_status
    status: active
    description: "MVP provisional attribute fixture/config values must not omit source_status or evidence-status labels."
