    adr: docs/architecture/adr-0008-attribute-event-signal-contract-and-scene-tree-independent-core.md
    added: 2026-06-04
    revised: ""

  - pattern: mutable_attribute_event_result_dto
    status: active
    description: "AttributeUpdateResult and AttributeDomainEvent DTOs must not expose public mutable vars, setters, mutators, mutable Resource payloads, mutable Dictionary payloads, or mutable collection references."
