    why: "Equipment owns legality and modifier resolution, while Character Attributes owns formula-tested attribute-derived display proxy computation."
    adr: docs/architecture/adr-0014-attribute-combat-power-main-stat-display-proxy-ownership.md
    added: 2026-06-04
    revised: ""

  - pattern: display_proxy_as_item_legality_or_value_authority
    status: active
