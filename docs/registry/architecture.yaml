    adr: docs/architecture/adr-0010-attribute-save-load-persistence-boundary-base-current-modifier-sources.md
    added: 2026-06-04
    revised: ""

  - pattern: load_hash_bypass_rebuild
    status: active
    description: "Debug snapshot hashes or comparison records must not skip load validation, migration, source normalization, current-resource validation, or candidate rebuild."
