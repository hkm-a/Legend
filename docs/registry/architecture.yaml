    adr: docs/architecture/adr-0008-attribute-event-signal-contract-and-scene-tree-independent-core.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_preview_as_committed_event
    status: active
    description: "AttributePreviewResult must not appear in committed AttributeDomainEvent arrays, invoke event sinks/signals, increment authoritative versions, replace snapshots, or commit source changes."
