    added: 2026-06-04
    revised: ""

  - pattern: shared_mutable_attribute_dto_payload
    status: active
    description: "Attribute DTOs must not expose mutable arrays, dictionaries, or shared RefCounted payloads that allow consumers to mutate authoritative or staged state."
    why: "RefCounted values use reference semantics; unchecked aliasing can bypass validation, transaction, and snapshot read-only boundaries."
