    adr: docs/architecture/adr-0010-attribute-save-load-persistence-boundary-base-current-modifier-sources.md
    added: 2026-06-04
    revised: ""

  - pattern: save_write_success_conflated_with_attribute_acceptance
    status: active
    description: "Save/Load must not treat Character Attributes load acceptance, signal delivery, or unchecked FileAccess calls as proof that a save slot was successfully written."
    why: "File/container IO can fail independently from attribute semantic validation; both result domains must be handled explicitly."
    adr: docs/architecture/adr-0010-attribute-save-load-persistence-boundary-base-current-modifier-sources.md
    added: 2026-06-04
    revised: ""

  - pattern: hardcoded_attribute_gameplay_values
    status: active
    description: "Character Attributes formula/runtime code must not hardcode provisional or OpenMir2-authentic gameplay values such as stat bounds, base stats, combat power weights, monster templates, or equipment modifier values."
    why: "Gameplay values must come from centralized fixture/config sources with source_status, versions, and validation so balance, save/load migration, and QA evidence remain traceable."
