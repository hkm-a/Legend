    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_versionless_source_update
    status: active
    description: "Structural attribute source update requests must not omit required expected source/snapshot version policy for their request kind."
    why: "Version expectations detect stale equipment, progression, save/load, debug, and UI commands deterministically before staging side effects."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_debug_mutation_bypass
    status: active
    description: "Debug attribute mutations must not bypass the normal transaction, validation, version expectation, source labeling, result, and audit path."
    why: "Debug-only changes can otherwise corrupt runtime truth or create impossible states that later systems treat as gameplay-valid."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: derived_attribute_snapshot_as_save_truth
    status: active
