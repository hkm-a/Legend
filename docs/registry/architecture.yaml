    adr: docs/architecture/adr-0010-attribute-save-load-persistence-boundary-base-current-modifier-sources.md
    added: 2026-06-04
    revised: ""

  - pattern: variant_object_graph_attribute_save_truth
    status: active
    description: "FileAccess.store_var/get_var object graphs, full_objects, RefCounted object identity, or embedded engine Objects must not be authoritative attribute save payloads."
