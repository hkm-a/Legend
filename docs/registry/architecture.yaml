    why: "Direct mutation bypasses actor-local transaction staging, validation, version checks, no-side-effect failure, and snapshot/event publication."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_mutate_then_rollback_transaction
    status: active
    description: "Character Attributes structural updates must not mutate committed authoritative state first and then rely on manual rollback if validation, calculation, or snapshot/result materialization fails."
    why: "GDScript reference semantics make rollback fragile; candidate construction plus final commit/swap is the accepted atomicity model."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_reentrant_mutation
    status: active
    description: "Mutation requests submitted during Character Attributes transaction, result materialization, or result dispatch must not be accepted in Phase 1."
    why: "Synchronous signal/event callback cascades can make callback order affect gameplay; Phase 1 rejects reentrant mutation until a scheduler ADR exists."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_candidate_state_exposure
    status: active
    description: "Candidate staged source/current/snapshot/result state must not be visible through snapshot/query APIs, events, signals, debug tools, or consumer reads before final commit/swap."
    why: "Consumers must see only last committed or newly committed read truth, never intermediate validation/calculation state."
    adr: docs/architecture/adr-0009-attribute-atomic-source-update-and-transaction-model.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_resource_mutation_reaggregates_modifiers
    status: active
    description: "Current HP/MP mutations must not reaggregate structural modifiers or advance source_version."
