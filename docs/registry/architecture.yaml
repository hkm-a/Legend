# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:

  - pattern: click_movement_local_string_or_sentinel_authority
    status: active
    adr: docs/architecture/adr-0022-click-movement-runtime-intent-path-query-input-gate-command-result-contract.md
    forbidden: "Click movement must not use local string path/input reasons, Dictionary-only DTOs, Vector2i.ZERO/previous-cell sentinels for missing logical cells, frame polling alone for movement intents, or direct singleton-only movement core logic."
    required_instead: "Use ADR-0022 typed DTOs/enums, has_* fields, same-event UI gate results, injected/adapted dependencies, and MapSpaceState command results."
    added: 2026-06-05
    revised: ""
  - pattern: visual_tile_data_as_gameplay_authority
    status: active
    description: "TileMapLayer, TileSet custom data, visual collision shapes, navigation shapes, sprites, and scene placement must not override MapDefinition gameplay facts."
    why: "Gameplay passability, item placement, and static spatial facts need a single logical authority independent of visual iteration."
    adr: docs/architecture/adr-0001-map-data-representation.md
    added: 2026-06-04
    revised: ""

  - pattern: per_cell_resource_or_node_map_storage
    status: active
    description: "MVP dense map cells must not be represented as one Resource or Node per logical cell."
    why: "Per-cell objects add memory, scene-tree, loading, and query overhead that conflicts with dense grid O(1) lookup and unit-testable map data."
    adr: docs/architecture/adr-0001-map-data-representation.md
    added: 2026-06-04
    revised: ""

  - pattern: normal_gameplay_full_map_scan
    status: active
    description: "Normal gameplay frame/update code must not scan the full map for ordinary spatial queries."
    why: "The GDD requires bounded runtime behavior; full-map scans are allowed for load-time/offline validation, not ordinary gameplay query loops."
    adr: docs/architecture/adr-0001-map-data-representation.md
    added: 2026-06-04
    revised: ""

  - pattern: local_spatial_reason_strings
    status: active
    description: "Downstream systems must not invent local string reason names for map-space query results."
    why: "Spatial query semantics must remain canonical so movement, spawn, drop, pickup, combat, rendering, and QA/debug tools interpret failures consistently."
    adr: docs/architecture/adr-0002-typed-query-result-schema.md
    added: 2026-06-04
    revised: ""

  - pattern: dictionary_only_spatial_query_payload
    status: active
    description: "Spatial query APIs must not expose only loose Dictionary payloads as their authoritative schema."
    why: "Dictionary-only payloads weaken type safety, refactor safety, and reason coverage tests."
    adr: docs/architecture/adr-0002-typed-query-result-schema.md
    added: 2026-06-04
    revised: ""

  - pattern: direct_map_space_state_mutation
    status: active
    description: "Actor nodes, controllers, AI, movement, spawn, drop, pickup, and combat systems must not directly mutate actor occupancy, item occupancy, or reservations outside MapSpaceState."
    why: "Direct mutation bypasses deterministic command ordering and creates race-like authority bugs."
    adr: docs/architecture/adr-0003-authoritative-occupancy-reservation-update-ordering.md
    added: 2026-06-04
    revised: ""

  - pattern: signal_callback_order_as_gameplay_authority
    status: active
    description: "Godot signal callback order must not decide movement reservation, occupancy, item placement, or pickup spatial state outcomes."
    why: "Callback order is hidden and fragile; gameplay mutations must flow through the authoritative queue."
    adr: docs/architecture/adr-0003-authoritative-occupancy-reservation-update-ordering.md
    added: 2026-06-04
    revised: ""

  - pattern: scene_tree_order_as_sort_authority
    status: active
    description: "Scene-tree insertion order, spawn callback order, or incidental child order must not decide deterministic Y-sort tie-breaks."
    why: "Y-sort ties must be resolved by explicit anchor Y, type rank, and stable ID."
