    added: 2026-06-04
    revised: ""

  - pattern: attribute_load_silent_repair
    status: active
    description: "Attribute load must not silently drop missing sources, clamp current resources, ignore unknown required keys, or repair incompatible versions without explicit versioned migration/recovery policy."
    why: "Silent repair hides data corruption, can erase player progress, and can present invalid persisted state as normal gameplay truth."
    adr: docs/architecture/adr-0010-attribute-save-load-persistence-boundary-base-current-modifier-sources.md
    added: 2026-06-04
    revised: ""

  - pattern: resource_object_attribute_save_truth
    status: active
    description: "Godot Resource/.tres instances, loaded Resource references, or duplicated Resource graphs must not be authoritative Character Attributes save truth."
