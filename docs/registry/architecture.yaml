  - pattern: display_name_or_resource_path_item_identity
    status: active
    description: "Item saves, drop tables, equipment references, inventory stacks, and UI bindings must not use localized display names, Resource paths, scene node names, icon paths, or runtime dense indexes as durable item identity."
    why: "Durable item identity must survive localization, asset moves, scene changes, and catalog reindexing through stable semantic item_id keys plus migration metadata."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
    added: 2026-06-04
    revised: ""

  - pattern: consumer_fabricated_missing_item_fallback
    status: active
    description: "Consumers must not silently fabricate generic item definitions, clamp missing fields, invent stack/equipment behavior, or display deprecated/invalid/provisional items as normal verified runtime items."
    why: "Missing, invalid, deprecated, disabled, and provisional item references need explicit status-bearing results so saves, drops, UI, and QA can handle data problems deterministically."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
    added: 2026-06-04
    revised: ""

  - pattern: mutable_item_definition_runtime_row_exposure
    status: active
    description: "Item Definition query/projection APIs must not expose mutable runtime catalog rows, mutable arrays/dictionaries, mutable Resources, public mutable vars, setters, mutator methods, or shared nested objects to consumers."
    why: "Catalog rows are shared cross-system template truth; mutable exposure lets one consumer corrupt drops, inventory, equipment, UI, save/load, economy, or QA behavior."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
    added: 2026-06-04
    revised: ""

  - pattern: item_definition_resource_graph_runtime_authority
    status: active
    description: "Loaded .tres Resources, ResourceLoader cache entries, duplicated Resource graphs, scene item Nodes, or visual prefabs must not become Item Definition runtime catalog authority."
    why: "Resources and scene objects are mutable/reference-based presentation or authoring artifacts; runtime item template truth must be normalized into project-owned DTO/table data."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
    added: 2026-06-04
    revised: ""

  - pattern: item_definition_validation_bypass_for_runtime_spawn
    status: active
    description: "Runtime item spawn, drop, inventory grant, equipment preview, save migration, or debug creation must not bypass ItemDefinitionRuntimeCatalog reference resolution and validation/status checks."
    why: "Unvalidated references can create impossible item instances, corrupt saves, or present disabled/deprecated/provisional content as normal gameplay truth."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
    added: 2026-06-04
    revised: ""

  - pattern: minimal_mir_client_as_behavior_authority
    status: active
    description: "MinimalMirClient, client observation, or visual behavior matching must not authorize OpenMir2 server/gameplay behavior rules."
    why: "The project treats OpenMir2 source as Tier 1; client observations may validate symptoms or locate source only."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: openmir2_contract_without_e3_source
    status: active
    description: "Required Phase 1 OpenMir2-derived contracts must not be accepted below E3 evidence or without Tier 1 source basis."
    why: "Movement, combat, death, drop, pickup, inventory, equipment, and protocol-entry behavior must not become source-authentic from guesses or weak evidence."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: runtime_openmir2_evidence_registry_authority
    status: active
    description: "Hot gameplay systems must not query the OpenMir2 evidence registry to decide movement, combat, drops, pickup, inventory, equipment, save, or protocol behavior."
    why: "The registry is offline/tooling/bootstrap governance; runtime truth belongs to accepted system ADRs and validated runtime catalogs."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: yaml_parser_dependency_without_approval
    status: active
    description: "Godot-native evidence tooling must not introduce YAML parser dependencies without explicit dependency approval."
    why: "Godot 4.6.3 has no project-approved YAML parser; evidence tooling should use approved built-in-readable formats or external-only YAML."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: gdscript_assert_as_contract_gate
    status: active
    description: "OpenMir2 contract readiness validation must not rely on GDScript assert() as the governance gate."
    why: "Readiness must produce deterministic structured failures visible to review, QA, and CI; assert() is only an optional developer aid."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: unchecked_fileaccess_registry_write
    status: active
    description: "Godot FileAccess registry/report reads and writes must not ignore open failures or Godot 4.4+ store_* boolean returns."
    why: "Silent read/write failure can produce partial evidence reports or falsely passing readiness gates."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: raw_evidence_record_as_openmir2_verified_claim
    status: active
    description: "A raw E3/E4 evidence record alone must not authorize openmir2_verified gameplay/data claims."
    why: "Downstream authenticity claims require an Accepted evidence or contract readiness result with conflict, version, decision, and field-completeness checks."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: unversioned_openmir2_contract_reference
    status: active
    description: "Downstream ADRs, GDDs, stories, and runtime catalogs must not cite mutable or unversioned OpenMir2 contracts when claiming source-authentic behavior."
    why: "Contract IDs and versions are required so later supersession or divergence can be audited without breaking traceability."
    adr: docs/architecture/adr-0016-openmir2-evidence-mapping-registry-and-provisional-contract-governance.md
    added: 2026-06-05
    revised: ""

  - pattern: drop_table_copies_item_definition_truth
    status: active
    description: "Drop tables must not copy item display, quality, stack, equipment, modifier, or template metadata as authoritative truth."
    why: "ItemDefinitionRuntimeCatalog owns item template truth; drop tables should store item references and roll policy only."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: "2026-06-05"

  - pattern: drop_table_silent_invalid_row_filtering
    status: active
    description: "Normal gameplay drop tables must not silently skip invalid enabled rows and roll remaining rows."
    why: "Skipping invalid rows changes authored probabilities without authoring awareness; invalid normal tables fail whole-table validation."
    adr: docs/architecture/adr-0021-drop-table-runtime-data-validation-deterministic-roll-and-grant-candidate-handoff.md
    added: 2026-06-05
    revised: ""

  - pattern: drop_table_direct_ground_inventory_mutation
    status: active
    description: "Drop Table must not create ground drops, mutate MapSpaceState item occupancy, grant inventory entries, equip items, or play presentation feedback."
    why: "ADR-0017 assigns ground lifecycle, pickup, inventory, equipment, and presentation to separate owners; Drop Table emits grant candidates only."
    adr: docs/architecture/adr-0021-drop-table-runtime-data-validation-deterministic-roll-and-grant-candidate-handoff.md
    added: 2026-06-05
    revised: ""

  - pattern: drop_table_probability_changed_by_inventory_state
    status: active
    description: "Inventory capacity, pickup failure, or ground placement failure must not alter Drop Table probabilities, reroll outcomes, or retroactively change roll results."
    why: "Drop Table is stateless reward policy; downstream lifecycle failures are handled by GroundDrop/Pickup/Inventory without corrupting roll provenance."
    adr: docs/architecture/adr-0021-drop-table-runtime-data-validation-deterministic-roll-and-grant-candidate-handoff.md
    added: 2026-06-05
    revised: ""

  - pattern: ground_drop_direct_map_occupancy_mutation
    status: active
    description: "GroundDropService and PickupService must not directly mutate MapSpaceState item occupancy outside PLACE_ITEM / REMOVE_ITEM commands."
    why: "MapSpaceState is the spatial item occupancy authority; direct mutation creates double authority and stale ground/drop state."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: pickup_half_commit
    status: active
    description: "Pickup must not leave inventory granted while ground drop remains available, or remove ground drop while inventory grant failed."
    why: "The pickup transaction spans ground lifecycle, map occupancy, and inventory receive; partial commit duplicates or deletes rewards."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: pickup_signal_or_presentation_as_commit_authority
    status: active
    description: "Signals, audio, VFX, UI, scene nodes, and Area2D/physics callbacks must not decide or imply pickup success before final PickupCommitResult.PICKED_UP."
    why: "Presentation may react to committed results only; callback or visual order must not become gameplay authority."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: global_random_or_wall_clock_drop_roll
    status: active
    description: "Drop rolls, quantity rolls, and pickup claim ordering must not use randomize(), global RNG state, wall-clock time, frame delta, scene-tree order, or dictionary iteration order."
    why: "Reward outcomes and pickup races must be deterministic, replayable, and unit-testable."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: ground_drop_as_inventory_storage_authority
    status: active
    description: "Ground drops must not own final inventory slots, stacks, equipped references, item instance truth, or save truth."
    why: "Ground drops are world lifecycle records and grant intents; final storage belongs to Inventory/Equipment/Save boundaries."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: openmir2_drop_claim_without_readiness
    status: active
    description: "Drop table, drop creation, ground item, pickup, despawn, ownership, range, or quantity behavior must not claim OpenMir2 authenticity without ADR-0016 Accepted readiness."
    why: "Until evidence governance accepts the relevant contract, concrete drop/pickup behavior is provisional or evidence-pending."
    adr: docs/architecture/adr-0017-drop-table-ground-drop-and-pickup-lifecycle-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: object_instance_id_as_item_identity
    status: active
    description: "Inventory, equipment, pickup, save/load, and debug systems must not use Object.get_instance_id(), RID, or engine object identity as item instance identity."
    why: "Godot object identity is runtime-local and lifecycle-dependent; item identity must be project-owned and persistence-safe."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: nodepath_or_resource_path_item_identity
    status: active
    description: "NodePath, Resource path, scene node name, icon path, display name, or localized text must not be durable item instance or equipment identity."
    why: "Assets, scenes, localization, and presentation can change independently from gameplay identity."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: inventory_copies_item_definition_truth
    status: active
    description: "Inventory records must not store copied item display, quality, stack policy, equipment payload, modifier rows, or template fields as authoritative truth."
    why: "ItemDefinitionRuntimeCatalog owns template truth; inventory stores references and instance/container state."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: equipment_direct_attribute_source_mutation
    status: active
    description: "Equipment must not directly mutate Character Attributes committed source sets, version counters, snapshots, or display proxy state."
    why: "Equipment-derived modifiers must enter Character Attributes through AttributeTransactionRequest so validation, version checks, and no-side-effect rejection apply."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: observable_equip_partial_commit
    status: active
    description: "Consumers must not observe Attributes committed to new equipment while Inventory/Equipment still publish old state, or Equipment slots changed while Attributes still publish old sources without stale/failure status."
    why: "Equip replacement must publish coherent cross-domain state to avoid UI, combat, save, and growth feedback inconsistencies."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: equipment_source_key_noncanonical
    status: active
    description: "Equipment-derived Attribute source keys must not be ad hoc strings, UI labels, Resource paths, display names, or caller-generated noncanonical payloads."
    why: "Character Attributes duplicate detection and replacement require EquipmentService canonicalization."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: ui_drag_drop_as_inventory_or_equipment_authority
    status: active
    description: "UI drag/drop, Control focus, scene node visibility, signals, or visual item nodes must not decide inventory/equipment truth."
    why: "UI submits requests and presents results; InventoryService and EquipmentService own gameplay state and transactions."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: autoload_inventory_equipment_authority_phase1
    status: active
    description: "Phase 1 Inventory/Equipment authority must not be hidden in an Autoload/global singleton unless a later ADR explicitly approves it."
    why: "Core inventory/equipment rules must remain injectable and unit-testable without scene-tree/global lifecycle coupling."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: equipment_preview_as_committed_growth
    status: active
    description: "Equipment preview-only comparison must not trigger committed growth feedback, Attribute source commits, authoritative version increments, or committed events."
    why: "Preview is hypothetical; growth celebration requires committed Attribute update and coherent Inventory/Equipment state."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: equipment_derived_attribute_source_save_truth_conflict
    status: active
    description: "Save/load must not treat both Equipment slot truth and separately persisted equipment-derived Attribute sources as independent authoritative truths without explicit conflict resolution."
    why: "Equipment-derived Attribute sources should rebuild from Equipment + ItemDefinition in Phase 1; duplicated save truth creates conflict on load."
    adr: docs/architecture/adr-0018-inventory-and-equipment-instance-modifier-transaction-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: non_logical_distance_authority
    status: active
    description: "Gameplay distance and adjacency decisions must not use Node2D/global position, sprite position, TileMapLayer coordinates, physics collision, navigation output, or screen/world coordinates as authority."
    why: "Distance facts must be derived from canonical logical Vector2i cells so movement, combat, pickup, spawn, and AI remain consistent."
    adr: docs/architecture/adr-0019-map-distance-and-movement-legality-contract.md
    added: 2026-06-05
    revised: ""

  - pattern: system_local_distance_metric_authority
    status: active
    description: "Combat, pickup, spawn, AI, movement, and debug systems must not each define private distance metric semantics for shared map-cell facts."
    why: "Private local metrics create cross-system inconsistencies; systems may own thresholds but must consume canonical distance facts."
    adr: docs/architecture/adr-0019-map-distance-and-movement-legality-contract.md
    added: 2026-06-05
    revised: ""

  - pattern: godot_navigation_or_physics_as_movement_authority
    status: active
    description: "NavigationAgent2D, NavigationServer2D, NavigationRegion2D, navmesh/polygons, avoidance velocity, CharacterBody2D collisions, Area2D, physics callbacks, and TileMapLayer navigation/collision/custom data must not decide authoritative movement legality."
    why: "Godot helpers may suggest or present movement, but legal movement must be revalidated through logical cells, MovementLegalityService, and MapSpaceState reservation/commit."
    adr: docs/architecture/adr-0019-map-distance-and-movement-legality-contract.md
    added: 2026-06-05
    revised: ""

  - pattern: movement_legality_direct_mapspace_mutation
    status: active
    description: "MovementLegalityService must not create, commit, cancel, sort, or resolve reservations or mutate actor/item occupancy directly."
    why: "Movement legality is a read-only decision boundary; ADR-0003 MapSpaceState owns authoritative mutation and deterministic conflict resolution."
    adr: docs/architecture/adr-0019-map-distance-and-movement-legality-contract.md
    added: 2026-06-05
    revised: ""

  - pattern: diagonal_or_corner_cutting_without_evidence
    status: active
    description: "Movement, pathfinding, combat, pickup, spawn, or AI systems must not treat diagonal movement, corner-cutting, or Chebyshev adjacency as OpenMir2-verified or default-authoritative without accepted evidence-backed policy."
    why: "Phase 1 diagonal and corner-cutting semantics are unresolved; provisional defaults must fail closed rather than become false source-authentic behavior."
    adr: docs/architecture/adr-0019-map-distance-and-movement-legality-contract.md
    added: 2026-06-05
    revised: ""

  - pattern: map_conversion_pipeline_as_runtime_authority
    status: active
    description: "Runtime gameplay systems must not parse source map envelopes, query conversion reports, or run conversion pipeline logic to decide movement, pickup, combat, spawn, Y-sort, or map facts."
    why: "Conversion is tooling/bootstrap; runtime truth comes from baked MapDefinition and ADR-owned runtime services."
    adr: docs/architecture/adr-0020-resource-map-conversion-pipeline-and-validation-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: visual_map_output_overrides_mapdefinition
    status: active
    description: "Generated TileMapLayer/scene output, TileSet custom data, collision/navigation shapes, scene tiles, visual matching reports, and visual draw order must not override MapDefinition gameplay facts."
    why: "ADR-0001 keeps static gameplay facts independent of visual presentation."
    adr: docs/architecture/adr-0020-resource-map-conversion-pipeline-and-validation-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: unverified_source_map_semantics
    status: active
    description: "OpenMir2/source-derived map, cell, coordinate, blocking, occlusion, or visual matching claims must not be labeled source-authentic without ADR-0016 readiness-passing evidence/contract references."
    why: "Visual matching or decoded data alone cannot authorize gameplay semantics."
    adr: docs/architecture/adr-0020-resource-map-conversion-pipeline-and-validation-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: unchecked_map_asset_writer_failure
    status: active
    description: "Map conversion writers must not ignore ResourceSaver.save(), PackedScene.pack(), FileAccess.open(), FileAccess.store_* bool returns, temp write, or replace failures."
    why: "A partial or failed generated map asset/report must not appear valid to implementation stories, CI, editor tooling, or runtime bootstrap validation."
    adr: docs/architecture/adr-0020-resource-map-conversion-pipeline-and-validation-boundary.md
    added: 2026-06-05
    revised: ""

  - pattern: editor_tooling_state_as_conversion_truth
    status: active
    description: "Editor selection state, @tool lifecycle, _ready() order, scene-tree insertion order, NodePath identity, ResourceLoader cache identity, Resource property order, or filesystem traversal order must not determine conversion output truth."
    why: "Conversion output must be deterministic and headless-testable; editor/tool wrappers are adapters only."
    adr: docs/architecture/adr-0020-resource-map-conversion-pipeline-and-validation-boundary.md
    added: 2026-06-05
    revised: ""

