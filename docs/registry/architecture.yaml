    adr: docs/architecture/adr-0008-attribute-event-signal-contract-and-scene-tree-independent-core.md
    added: 2026-06-04
    revised: ""

  - pattern: autoload_attribute_event_bus_phase1
    status: active
    description: "Phase 1 Character Attributes must not introduce an Autoload global event bus as the event/signal authority."
    why: "A global bus adds hidden coupling and is unnecessary for the offline Phase 1 slice; any later global routing must be a downstream adapter covered by a separate ADR."
    adr: docs/architecture/adr-0008-attribute-event-signal-contract-and-scene-tree-independent-core.md
    added: 2026-06-04
    revised: ""

  - pattern: direct_attribute_source_set_mutation
    status: active
