  - purpose: attribute_runtime_stat_identity
    status: active
    api: "Project-owned contiguous append-only typed enum/int StatId plus normalized dense runtime vectors"
    not: "Raw strings, StringName-only maps, Resource objects, or enum ordinals as durable save/config truth"
