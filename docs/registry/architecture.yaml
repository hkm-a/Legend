    adr: docs/architecture/adr-0007-attribute-snapshot-query-api-shape-and-read-only-enforcement.md
    added: 2026-06-04
    revised: ""

  - pattern: snapshot_debug_trace_eager_payload
    status: active
    description: "Normal runtime attribute snapshots must not embed unbounded formatted debug traces or full source breakdown payloads by default."
    why: "Debug trace must remain lazy, pull-based, or invalid/debug-only to avoid memory, allocation, and event payload bloat."
    adr: docs/architecture/adr-0007-attribute-snapshot-query-api-shape-and-read-only-enforcement.md
    added: 2026-06-04
    revised: ""

  - pattern: dictionary_only_attribute_snapshot_payload
    status: active
