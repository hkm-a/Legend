    adr: docs/architecture/adr-0013-attribute-godot-resource-duplication-shared-reference-policy-if-tres-resources-are-used.md
    added: 2026-06-04
    revised: ""

  - pattern: resource_loader_cache_attribute_authority
    status: active
    description: "Character Attributes gameplay correctness must not depend on ResourceLoader cache mode, repeated-load object identity, Resource path identity, or live mutation of loaded Resource instances."
    why: "ResourceLoader behavior is a bootstrap/import concern; gameplay truth must come from validated normalized DTO/table data independent of cache/shared-reference behavior."
    adr: docs/architecture/adr-0013-attribute-godot-resource-duplication-shared-reference-policy-if-tres-resources-are-used.md
    added: 2026-06-04
    revised: ""

  - pattern: resource_backed_formula_unit_fixtures
    status: active
    description: "Character Attributes blocking formula/contract unit tests must not use .tres Resources, ResourceLoader, FileAccess, or Resource-backed fixture graphs as authoritative setup."
    why: "Formula evidence must prove core DTO/table behavior directly; Resource importer/bootstrap tests are supplemental and cannot substitute for ADR-0012 formula tests."
    adr: docs/architecture/adr-0013-attribute-godot-resource-duplication-shared-reference-policy-if-tres-resources-are-used.md
    added: 2026-06-04
    revised: ""

  - pattern: resource_reflection_as_attribute_schema
    status: active
    description: "Attribute .tres importers must not treat arbitrary exported Resource properties, broad get_property_list() reflection output, editor metadata, inherited Resource properties, or Resource property order as the authoritative config schema."
    why: "Resource import must be explicit, versioned, schema-driven, and deterministic so unsupported Object/Resource payloads and engine/editor ordering do not bypass ADR-0011 validation."
    adr: docs/architecture/adr-0013-attribute-godot-resource-duplication-shared-reference-policy-if-tres-resources-are-used.md
    added: 2026-06-04
    revised: ""

  - pattern: combat_power_as_damage_authority
    status: active
    description: "Combat, AI, damage, hit, crit, DPS, TTK, or target-selection logic must not use Character Attributes combat_power or display proxy DTOs as gameplay authority."
