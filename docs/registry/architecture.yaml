    why: "Display proxy data is a provisional presentation aid; item legality and value belong to Equipment, Item Definition, Economy, and UI systems."
    adr: docs/architecture/adr-0014-attribute-combat-power-main-stat-display-proxy-ownership.md
    added: 2026-06-04
    revised: ""

  - pattern: raw_item_dictionary_as_definition_authority
    status: active
    description: "Drops, inventory, equipment, UI, economy, save/load, and QA/debug tools must not treat raw dictionaries, JSON rows, Variant maps, or locally constructed item payloads as authoritative item definition truth."
    why: "Item templates need schema validation, lifecycle/source/evidence labels, deterministic indexes, and typed query/status semantics before gameplay consumption."
    adr: docs/architecture/adr-0015-item-definition-runtime-data-validation-query-and-versioning.md
