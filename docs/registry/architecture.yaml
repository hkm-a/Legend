    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: openmir2_verified_without_evidence
    status: active
    description: "Attribute config values must not use openmir2_verified or equivalent source-authentic labels without evidence ID/source reference."
    why: "Authenticity claims need traceable evidence; otherwise provisional values can become false canonical behavior."
    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_config_live_reload_bypassing_transaction
    status: active
    description: "Future Character Attributes config reload/change mechanisms must not bypass validation, versioning, transaction/update result semantics, or snapshot publication rules."
    why: "Live reload can otherwise change gameplay truth without deterministic failure handling, version advancement, or consumer invalidation."
    adr: docs/architecture/adr-0011-attribute-fixture-config-loading-strategy-mvp-provisional-values.md
    added: 2026-06-04
    revised: ""

  - pattern: scene_tree_dependent_attribute_blocking_tests
    status: active
    description: "Character Attributes blocking formula/contract unit tests must not require gameplay scenes, Node lifecycle, SceneTree APIs, Autoloads, UI/Control state, timers, frames, or signal processing as their test oracle."
    why: "Scene/runtime dependencies can mask formula, validation, transaction, snapshot, and result-contract defects that must be proven in the injectable core."
    adr: docs/architecture/adr-0012-attribute-formula-only-gut-test-strategy-without-scene-tree-ui-autoload.md
    added: 2026-06-04
    revised: ""

  - pattern: filesystem_resource_attribute_formula_fixtures
    status: active
    description: "Character Attributes blocking formula/contract tests must not depend on ResourceLoader, FileAccess, real .tres files, real .tscn files, save slot paths, or filesystem fixtures as authoritative setup."
    why: "Blocking formula evidence must exercise primitive payloads, factories, normalizers, and injected DTO/config tables without file/import/cache behavior obscuring core failures."
