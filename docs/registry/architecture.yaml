    adr: docs/architecture/adr-0006-attribute-data-representation-and-stat-id-typing.md
    added: 2026-06-04
    revised: ""

  - pattern: enum_ordinal_as_durable_attribute_identity
    status: active
    description: "Character attribute save/config/debug durable data must not treat StatId enum ordinals as long-term truth without a versioned migration table."
