    added: 2026-06-04
    revised: ""

  - pattern: attribute_signal_callback_order_authority
    status: active
    description: "Godot signal callback order must not decide Character Attributes transaction status, source commit/rollback, snapshot/resource version publication, combat truth, save truth, or growth eligibility."
    why: "Signals are downstream notification hints only; gameplay truth must already be decided by the scene-tree-independent core result."
    adr: docs/architecture/adr-0008-attribute-event-signal-contract-and-scene-tree-independent-core.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_event_payload_as_full_state_authority
    status: active
    description: "Attribute event payloads must not become full authoritative state transfer, carry full old+new snapshots by default, or replace ADR-0007 snapshot/query APIs for current truth."
