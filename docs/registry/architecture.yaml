    adr: docs/architecture/adr-0007-attribute-snapshot-query-api-shape-and-read-only-enforcement.md
    added: 2026-06-04
    revised: ""

  - pattern: public_mutable_attribute_result_dto
    status: active
    description: "Attribute snapshot/query/result/row DTOs must not expose public mutable vars, setters, mutator methods, or mutable nested collection references."
    why: "Query results are part of the read-only enforcement boundary; if result DTOs are mutable, consumers can bypass snapshot validity and status semantics."
    adr: docs/architecture/adr-0007-attribute-snapshot-query-api-shape-and-read-only-enforcement.md
    added: 2026-06-04
    revised: ""

  - pattern: attribute_core_scene_tree_dependency
    status: active
    description: "Character Attributes core formula/update logic must not depend on Node lifecycle, SceneTree, NodePath, get_tree(), Autoload globals, scene signals, or _ready/_process callbacks."
