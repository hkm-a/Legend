    api: "RefCounted immutable-by-contract AttributeSnapshot value objects returned through query result wrappers, with defensive-copy collection access and duplicated stale/invalid status metadata"
    not: "Mutable dictionaries, public mutable DTO vars, Resource snapshots, raw snapshot-only APIs without status wrappers, or eager debug trace payloads"
