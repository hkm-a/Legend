    why: "Downstream evidence proves wiring and presentation, but cannot prove core formula results, structured failures, no-side-effect transactions, immutable-by-contract DTOs, or deterministic failure ordering."
    adr: docs/architecture/adr-0012-attribute-formula-only-gut-test-strategy-without-scene-tree-ui-autoload.md
    added: 2026-06-04
    revised: ""

  - pattern: signal_order_attribute_test_oracle
    status: active
    description: "Character Attributes blocking tests must not assert formula/update correctness through Godot signal callback order, listener order, deferred call order, timer order, or frame ordering."
    why: "ADR-0008 and ADR-0009 make returned result DTOs and committed state the authority; callback order is downstream notification behavior and must not decide gameplay truth."
    adr: docs/architecture/adr-0012-attribute-formula-only-gut-test-strategy-without-scene-tree-ui-autoload.md
    added: 2026-06-04
    revised: ""

  - pattern: mutable_resource_graph_attribute_runtime_authority
    status: active
    description: "Loaded .tres Resources, duplicated Resource graphs, nested Resources, subresources, exported Resource containers, or ResourceLoader cache entries must not become Character Attributes runtime config, snapshot, transaction, save, or formula authority."
    why: "Godot Resources are mutable reference objects and may be shared/cached; runtime authority must be normalized into project-owned DTO/table data."
    adr: docs/architecture/adr-0013-attribute-godot-resource-duplication-shared-reference-policy-if-tres-resources-are-used.md
    added: 2026-06-04
    revised: ""

  - pattern: resource_duplicate_as_deep_isolation
    status: active
    description: "Character Attributes must not treat Resource.duplicate() or a duplicated Resource graph as sufficient nested isolation for config, fixtures, snapshots, save truth, or runtime authority."
