# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: logical_map_data_source
    status: active
    api: "Custom Resource `MapDefinition` with flattened `Packed*Array` / typed array fields"
    not: "TileMapLayer-authoritative gameplay data"
    adr: docs/architecture/adr-0001-map-data-representation.md
    reason: "Logical gameplay map facts must remain unit-testable, deterministic, and independent of visual tile edits."
    referenced_by:
      - docs/architecture/adr-0001-map-data-representation.md
    added: 2026-06-04
    revised: ""

  - purpose: visual_tile_layer
    status: active
    api: "Godot `TileMapLayer` for visual/editor presentation only"
    not: "Deprecated `TileMap`, or TileMapLayer as gameplay authority"
    adr: docs/architecture/adr-0001-map-data-representation.md
    reason: "Godot 4.6.3 deprecates TileMap; visual layers may assist validation but must not override MapDefinition gameplay facts."
    referenced_by:
      - docs/architecture/adr-0001-map-data-representation.md
    added: 2026-06-04
    revised: ""

  - purpose: spatial_query_schema_representation
    status: active
    api: "Typed GDScript enums plus RefCounted DTOs (`SpatialQueryResult`, `CellFactsSnapshot`)"
    not: "Dictionary-only payloads or StringName-only internal reason authority"
    adr: docs/architecture/adr-0002-typed-query-result-schema.md
    reason: "Spatial query semantics must be type-safe, testable, and consistent across movement, spawn, drop, pickup, combat, rendering, and QA/debug tools."
    referenced_by:
      - docs/architecture/adr-0002-typed-query-result-schema.md
    added: 2026-06-04
    revised: ""

  - purpose: map_space_update_authority
    status: active
    api: "MapSpaceState authoritative command queue with deterministic created_sequence ordering"
    not: "Immediate mutation by actor/controller nodes or signal callback order"
    adr: docs/architecture/adr-0003-authoritative-occupancy-reservation-update-ordering.md
    reason: "Actor occupancy, item occupancy, and reservations must mutate through one deterministic authority."
    referenced_by:
      - docs/architecture/adr-0003-authoritative-occupancy-reservation-update-ordering.md
    added: 2026-06-04
    revised: ""

  - purpose: y_sort_presentation_ordering
    status: active
    api: "MapSortCoordinator computes explicit (anchor_y, object_type_sort_rank, stable_instance_id) keys"
    not: "Deprecated YSort nodes or incidental scene-tree insertion order"
    adr: docs/architecture/adr-0004-deterministic-y-sort-implementation.md
    reason: "Presentation order must be deterministic and testable while remaining separate from gameplay legality."
    referenced_by:
      - docs/architecture/adr-0004-deterministic-y-sort-implementation.md
    added: 2026-06-04
    revised: ""

  - purpose: input_projection_service
    status: active
    api: "MapProjection service converts UI-gated screen/viewport/world input into logical Vector2i candidates"
    not: "Controller-local conversion or TileMapLayer-authoritative coordinate lookup"
    adr: docs/architecture/adr-0005-input-projection-coordinate-conversion.md
    reason: "Movement, pickup, targeting, and debug tools need one shared coordinate conversion contract."
    referenced_by:
      - docs/architecture/adr-0005-input-projection-coordinate-conversion.md
    added: 2026-06-04
    revised: ""


  - purpose: click_movement_runtime_contract
    status: active
    api: "Typed RefCounted DTOs/enums for MovementInputGateResult, ClickMovementIntent, ClickPathQueryResult, ClickMovementTuning, and command-result adapters"
    not: "Controller-local dictionaries, local strings, Vector2i.ZERO sentinels, frame-polling movement intents, Godot Navigation/Physics/TileMap/Y-sort authority, or direct singleton-only core logic"
    adr: docs/architecture/adr-0022-click-movement-runtime-intent-path-query-input-gate-command-result-contract.md
    reason: "Approved click movement requires typed input/path/command contracts, same-event UI gate ownership, deterministic orthogonal path planning, and scene-tree-independent testable core logic before implementation Done."
    referenced_by:
