      - resource_current_before
      - resource_delta
      - resource_min_bound
      - resource_max_after
      - resource_reason
      - resource_bounds_valid
      - combat_ready_health_valid
    output_range: [current_resource_integer, structured_failure]
    expression: "resource_max_after(resource_id) = effective_stat(resource_max_stat_id); resource_bounds_valid(resource_id) = resource_min_bound(resource_id) <= resource_max_after(resource_id); current_resource_after(resource_id) = clamp(resource_current_before + resource_delta, resource_min_bound(resource_id), resource_max_after(resource_id)) IF resource_bounds_valid AND resource_reason permits correction; otherwise propagate max-stat failure or structured_failure(invalid_resource_bounds/resource_request_invalid)"
    notes: "Clamps current HP/MP only for approved resource reasons. Damage/heal/spend/restore/max-resource clamp/load/spawn/debug use distinct reason policies; max-resource correction is not combat damage/healing. Combat-ready live actors require health_max > 0."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: snapshot_valid
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - config_valid
      - identity_valid
      - all_required_inputs_present
      - source_input_valid
      - all_active_stats_calculated
      - all_required_pairs_valid
      - all_current_resources_valid
      - combat_readiness_valid
      - snapshot_failure_reasons
    output_range: [false, true]
    expression: "snapshot_valid = config_valid AND identity_valid AND all_required_inputs_present AND source_input_valid AND all_active_stats_calculated AND all_required_pairs_valid AND all_current_resources_valid AND combat_readiness_valid"
    notes: "Determines whether an AttributeSnapshot can be published to downstream systems. Failure reasons are canonical codes sorted by registry order and include config/source/input/pair/resource/combat-readiness failures. Invalid snapshots are not combat-consumable; previous valid snapshots may only be stale/display fallback."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: attribute_delta
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - stat_id
      - snapshot_before_value
      - snapshot_after_value
      - snapshot_before_actor_id
      - snapshot_after_actor_id
      - snapshot_before_schema_version
      - snapshot_after_schema_version
      - snapshot_before_config_version
      - snapshot_after_config_version
      - snapshot_before_version
      - snapshot_after_version
      - preview_non_authoritative
    output_range: [signed_difference, structured_failure]
    expression: "attribute_delta(stat_id) = snapshot_after_value(stat_id) - snapshot_before_value(stat_id) IF snapshots are valid, actor IDs match, schema/config versions match, stat exists in both snapshots, and authoritative after-version is newer unless preview_non_authoritative; otherwise structured_failure(delta_invalid_snapshot/delta_actor_mismatch/delta_incomparable_schema/delta_incomparable_config/delta_missing_stat/delta_stale_or_reversed_version)"
    notes: "Reports signed differences between comparable snapshots or current-vs-preview result. Cross-config/schema comparisons require explicit migration policy and otherwise fail."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: snapshot_delta
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - comparable_stat_ids
      - comparable_pair_ids
      - delta_request_mode
      - attribute_delta
      - attribute_pair_delta
    output_range: [sparse_delta_map, sparse_pair_delta_map, structured_failure]
    expression: "snapshot_delta = ordered sparse non-zero deltas for requested comparable_stat_ids; explicit requested-set mode fails on missing active requested stats; visible_player_summary filters inactive/reserved/debug-only stats before calculation; debug_full may include hidden/debug stats if schema/config comparable; pair and scalar views must not double-count"
    notes: "Produces snapshot-level diff output for equipment, HUD, growth feedback, save/load diagnostics, and debug tools. Incomparable snapshots or missing requested active stats return structured failure rather than silent partial output."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: combat_power
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - attack_weight
      - defense_weight
      - health_weight
      - secondary_weight
      - physical_attack_pair
      - physical_defense_pair
      - health_max
      - secondary_contribution
      - combat_power_raw
    output_range: [non_negative_integer, structured_failure]
    expression: "combat_power_config_valid = all weights >= 0 AND at least one active player-facing weight > 0; secondary_contribution = sum(secondary_weight_j * effective_stat(secondary_stat_id_j)) for enabled, combat-active, player-facing secondary stats; combat_power_raw = attack_weight * average_pair(physical_attack) + defense_weight * average_pair(physical_defense) + health_weight * health_max + secondary_contribution; combat_power = round_to_int(combat_power_raw) IF config and child stat/pair formulas succeed; otherwise structured_failure(invalid_combat_power_config/combat_power_no_active_weight or propagated child failure)"
    notes: "MVP provisional display-only comparison score for equipment UI and growth feedback. It is not OpenMir2-authentic and does not define damage, DPS, or TTK. Inactive/reserved stats contribute exactly 0."
    added: 2026-06-04
    revised: "2026-06-04"

