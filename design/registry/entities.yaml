      - in_bounds
      - required_item_placement_data_available
      - terrain_item_placeable
      - item_count
      - same_cell_item_capacity
      - item_capacity_available
    output_range: [false, true]
    expression: "bounds_valid AND required_item_placement_data_available AND in_bounds AND terrain_item_placeable AND item_capacity_available; item_capacity_available = item_count < same_cell_item_capacity; same_cell_item_capacity = 1 for Phase 1 playable contract"
    notes: "Determines whether a dropped item may occupy a target logical cell. Phase 1 pickup-complete stories use same_cell_item_capacity = 1; missing item-placement data returns unknown_or_unloaded."
    added: 2026-06-03
    revised: "2026-06-03"

