    output_range: [lexicographic_tuple, structured_failure_reason]
    expression: "y_sort_key_valid = anchor_y_valid AND object_type_sort_rank_valid AND stable_instance_id_valid AND stable_instance_id_comparable_with_active_set; y_sort_key = (anchor_y, object_type_sort_rank, stable_instance_id) IF y_sort_key_valid; otherwise invalid_y_sort_anchor, invalid_y_sort_rank, or invalid_stable_sort_id"
    notes: "Determines deterministic visual ordering for sortable map objects. Invalid anchors, missing type ranks, or incomparable stable IDs return structured presentation/debug reasons instead of falling back to scene-tree order."
