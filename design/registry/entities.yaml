  - name: query_result_priority
    status: active
    source: design/gdd/map-coordinate-blocking-y-sort-system.md
    referenced_by:
      - design/gdd/map-coordinate-blocking-y-sort-system.md
      - design/gdd/click-movement-system.md
    variables:
      - candidate_reasons
      - query_context
      - coordinate_resolved
      - bounds_valid
      - required_query_data_available
      - in_bounds
      - source_cell
      - target_cell
      - terrain_blocks_query
      - target_occupied_by_other_actor
      - target_reserved_by_other_actor
      - item_capacity_available
      - item_count
      - pickup_selection_order_available
      - anchor_y_valid
      - object_type_sort_rank_valid
      - stable_instance_id_valid
      - stable_instance_id_comparable_with_active_set
    output_range: [reason_enum, reason_enum]
    expression: "first_reason_by_priority(candidate_reasons); pickup_candidate_available IF item_count = 1 OR (item_count > 1 AND pickup_selection_order_available); invalid_y_sort_rank IF presentation_debug AND anchor_y_valid AND NOT object_type_sort_rank_valid; priority = invalid_coordinate > unknown_or_unloaded > out_of_bounds > no_movement_requested > invalid_y_sort_anchor > invalid_y_sort_rank > invalid_stable_sort_id > blocked_by_static_map > blocked_by_actor > reserved > item_capacity_full > no_item_present > pickup_selection_order_unresolved > pickup_candidate_available > walkable/item_placeable"
    notes: "Selects the canonical structured reason for a single query_context, including actor entry, item placement, reservation, pickup spatial candidate, and presentation/debug queries."
    added: 2026-06-03
    revised: "2026-06-03"

  - name: effective_stat
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - stat_id
      - base_stat_value
      - sum_active_flat_modifiers
      - stat_min_bound
      - stat_max_bound
      - stat_config_valid
      - stat_clamp_policy
    output_range: [effective_stat_integer, structured_failure]
    expression: "stat_config_valid(stat_id) = stat_id_enabled AND stat_min_bound(stat_id) <= stat_max_bound(stat_id); effective_stat(stat_id) = clamp(base_stat_value(stat_id) + sum_active_flat_modifiers(stat_id), stat_min_bound(stat_id), stat_max_bound(stat_id)) IF stat_config_valid; otherwise structured_failure(invalid_stat_config, stat_id)"
    notes: "Calculates a scalar effective stat for the Phase 1 MVP attribute snapshot. Child inputs must be finite integers in technical safe range; unsupported modifier ops, unknown IDs, invalid bounds, or numeric overflow return structured failure rather than wrapping or coercing."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: effective_stat_pair
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
      - pair_id
      - pair_min_stat_id
      - pair_max_stat_id
      - pair_bound_config_valid
      - pair_min_final
      - pair_max_final
    output_range: [success_pair, structured_failure]
    expression: "pair_bound_config_valid(pair_id) = stat_min_bound(pair_min_stat_id) <= stat_max_bound(pair_max_stat_id); pair_min_final = effective_stat(pair_min_stat_id); pair_max_final = effective_stat(pair_max_stat_id); success(pair_min_final, pair_max_final) IF child formulas succeed AND pair_bound_config_valid AND pair_min_final <= pair_max_final; otherwise propagate child failure or structured_failure(invalid_pair_bound_config/invalid_stat_pair, pair_id)"
    notes: "Validates active MVP min/max pairs such as physical attack and physical defense. Nested effective_stat failures propagate; invalid pairs are not silently swapped or normalized."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: current_resource_after
    status: active
    source: design/gdd/character-attributes-system.md
    referenced_by:
      - design/gdd/character-attributes-system.md
    variables:
