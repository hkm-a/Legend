    variables:
      - item_id_present
      - item_id_format_valid
      - item_id_registered_in_runtime_definitions
      - referenced_definition_version_supported
    output_range: [false, true, structured_reason_set]
    expression: "item_id_present AND item_id_format_valid AND item_id_registered_in_runtime_definitions AND referenced_definition_version_supported"
    notes: "Determines whether a downstream item reference can locate a supported runtime definition row. Deprecated/debug/blocked status is resolved by later profile eligibility gates, not by lookup alone."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: item_definition_semantically_valid
    status: active
    source: design/gdd/item-definition-system.md
    referenced_by:
      - design/gdd/item-definition-system.md
    variables:
      - identity_valid
      - display_metadata_valid
      - item_type_valid
      - quality_valid
      - stack_policy_valid
      - equipment_stack_policy_valid
      - equipment_data_valid
      - modifier_payload_valid
      - evidence_labels_valid
      - player_facing_metadata_valid
    output_range: [false, true, structured_reason_set]
    expression: "identity_valid AND display_metadata_valid AND item_type_valid AND quality_valid AND stack_policy_valid AND equipment_stack_policy_valid AND equipment_data_valid AND modifier_payload_valid AND evidence_labels_valid AND player_facing_metadata_valid"
    notes: "Determines whether one item definition row is structurally and semantically valid independent of runtime profile. Debug-only or deprecated rows may be semantically valid but fail profile eligibility."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: definition_profile_eligible
    status: active
    source: design/gdd/item-definition-system.md
    referenced_by:
      - design/gdd/item-definition-system.md
    variables:
      - item_definition_semantically_valid
      - lifecycle_state_allowed_for_profile
      - item_type_allowed_for_profile
      - source_status_allowed_for_profile
      - debug_hidden_in_profile
      - blocked_unconfirmed_in_profile
    output_range: [false, true, structured_reason_set]
    expression: "item_definition_semantically_valid AND lifecycle_state_allowed_for_profile AND item_type_allowed_for_profile AND source_status_allowed_for_profile AND NOT debug_hidden_in_profile AND NOT blocked_unconfirmed_in_profile"
    notes: "Determines whether a semantically valid definition is eligible for a specific validation/runtime profile such as normal spawn, debug runtime, content smoke, or save-load resolution."
    added: 2026-06-04
    revised: "2026-06-04"

  - name: spawn_eligible_reference
    status: active
    source: design/gdd/item-definition-system.md
    referenced_by:
      - design/gdd/item-definition-system.md
      - design/gdd/drop-table-system.md
    variables:
      - item_reference_lookup_resolvable
      - referenced_definition_profile_eligible
      - spawn_profile_allows_item_type
      - referenced_definition_deprecated_for_new_spawn
    output_range: [false, true, structured_reason_set]
    expression: "item_reference_lookup_resolvable AND referenced_definition_profile_eligible AND spawn_profile_allows_item_type AND NOT referenced_definition_deprecated_for_new_spawn"
    notes: "Determines whether an external drop/spawn reference points to a definition eligible for normal spawning. It does not define drop chance, timing, placement, or quantity."
    added: 2026-06-04
    revised: "2026-06-05"

  - name: drop_group_total_weight
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - no_drop_weight
      - row_weight_i
    output_range: [1, 1000000, structured_reason_set]
    expression: "no_drop_weight + sum(row_weight_i for all enabled valid rows in group)"
    notes: "Determines whether a drop roll group has a valid selectable total weight. Negative, zero-total, or overflow configurations fail validation."
    added: 2026-06-05
    revised: ""

  - name: selected_drop_entry
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - roll_value
      - drop_group_total_weight
      - cumulative_weight_candidate
    output_range: [NO_DROP, row_id, structured_reason_set]
    expression: "roll_value = rng_int(0, drop_group_total_weight - 1); selected_drop_entry = first candidate where cumulative_weight_candidate > roll_value"
    notes: "Defines deterministic weighted single selection in stable candidate order. Roll authority must use injected deterministic RNG, not global RNG or scene order."
    added: 2026-06-05
    revised: ""

  - name: drop_row_probability
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - row_weight_i
      - drop_group_total_weight
    output_range: [0.0, 1.0]
    expression: "row_weight_i / drop_group_total_weight"
    notes: "Computes per-attempt probability for a row in a mutually exclusive weighted_single group. No-drop probability uses the same formula with no_drop_weight."
    added: 2026-06-05
    revised: ""

  - name: expected_attempts_for_row
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - drop_row_probability_i
    output_range: [1.0, Infinity, undefined_if_probability_zero]
    expression: "1 / drop_row_probability_i"
    notes: "QA-facing expected attempts metric for one row. Probability zero means the row is disabled/not normally acquirable and expected attempts are undefined."
    added: 2026-06-05
    revised: ""

  - name: expected_attempts_for_tier
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - tier_probability
      - drop_row_probability_i
    output_range: [1.0, Infinity, undefined_if_probability_zero]
    expression: "tier_probability = sum(drop_row_probability_i for mutually exclusive tier rows); expected_attempts_for_tier = 1 / tier_probability"
    notes: "QA-facing expected attempts metric for a tier of mutually exclusive rows. Independent future groups must use complement probability instead."
    added: 2026-06-05
    revised: ""

  - name: drop_quantity_result
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - fixed_quantity
      - quantity_min
      - quantity_max
      - deterministic_rng_int
      - stack_quantity_valid
    output_range: [1, item_max_stack_size, structured_reason_set]
    expression: "fixed policy: fixed_quantity; uniform policy: quantity_min + rng_int(0, quantity_max - quantity_min); then validate through stack_quantity_valid"
    notes: "Defines item grant quantity intent. Equipment rows are fixed at 1 in Phase 1; material rows must satisfy Item Definition stack limits."
    added: 2026-06-05
    revised: ""

  - name: drop_table_valid
    status: active
    source: design/gdd/drop-table-system.md
    referenced_by:
      - design/gdd/drop-table-system.md
    variables:
      - table_identity_valid
      - all_groups_valid
      - all_rows_valid
      - all_item_references_spawn_eligible
      - all_quantity_policies_valid
      - evidence_labels_valid
    output_range: [false, true, structured_reason_set]
    expression: "table_identity_valid AND all_groups_valid AND all_rows_valid AND all_item_references_spawn_eligible AND all_quantity_policies_valid AND evidence_labels_valid"
    notes: "Determines whether a drop table may be used for normal gameplay. Invalid rows fail the table in normal mode rather than being silently skipped."
    added: 2026-06-05
    revised: ""


