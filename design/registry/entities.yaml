# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: evidence_readiness_score
    status: active
    source: design/gdd/openmir2-behavior-mapping-spike.md
    referenced_by:
      - design/gdd/openmir2-behavior-mapping-spike.md
    variables:
      - evidence_level
      - source_authority_weight
      - conflict_multiplier
    output_range: [0.0, 1.0]
    expression: "min(1.0, (evidence_level / 4) * source_authority_weight * conflict_multiplier)"
    notes: "Measures whether a mapping item has enough evidence maturity for downstream GDD use."
    added: 2026-06-03
    revised: ""

  - name: domain_completion_status
    status: active
    source: design/gdd/openmir2-behavior-mapping-spike.md
    referenced_by:
      - design/gdd/openmir2-behavior-mapping-spike.md
    variables:
      - required_fields_complete
      - required_fields_total
    output_range: [0.0, 1.0]
    expression: "required_fields_complete / required_fields_total"
    notes: "Measures whether a behavior domain has all required mapping deliverables."
    added: 2026-06-03
    revised: ""

  - name: downstream_contract_readiness
    status: active
    source: design/gdd/openmir2-behavior-mapping-spike.md
    referenced_by:
      - design/gdd/openmir2-behavior-mapping-spike.md
    variables:
      - evidence_gate_pass
      - conflict_gate_pass
      - contract_fields_status
    output_range: [0.0, 1.0]
    expression: "min(evidence_gate_pass, conflict_gate_pass, contract_fields_status)"
    notes: "Determines whether an Adopt/Simplify behavior domain can be cited as a provisional downstream contract."
    added: 2026-06-03
    revised: ""

  - name: risk_gate_trigger
    status: active
    source: design/gdd/openmir2-behavior-mapping-spike.md
    referenced_by:
      - design/gdd/openmir2-behavior-mapping-spike.md
    variables:
      - required_evidence_gap
      - conflict_present
      - missing_primary_source
      - forbidden_invention_detected
    output_range: [0, 1]
    expression: "max(required_evidence_gap, conflict_present, missing_primary_source, forbidden_invention_detected)"
    notes: "Returns 1 when a behavior domain must pause downstream GDD citation and return to source verification."
    added: 2026-06-03
    revised: ""

  - name: in_bounds
    status: active
    source: design/gdd/map-coordinate-blocking-y-sort-system.md
    referenced_by:
      - design/gdd/map-coordinate-blocking-y-sort-system.md
      - design/gdd/click-movement-system.md
    variables:
      - map_loaded
      - map_width
      - map_height
      - cell_data_matches_dimensions
      - cell_x
      - cell_y
    output_range: [false, true]
    expression: "map_loaded AND map_width > 0 AND map_height > 0 AND cell_data_matches_dimensions AND (0 <= cell_x < map_width) AND (0 <= cell_y < map_height)"
    notes: "Determines whether a queried logical grid coordinate exists inside trusted gameplay map bounds; if bounds are invalid, queries return unknown_or_unloaded rather than out_of_bounds."
    added: 2026-06-03
    revised: "2026-06-03"

  - name: actor_enterable
    status: active
    source: design/gdd/map-coordinate-blocking-y-sort-system.md
    referenced_by:
      - design/gdd/map-coordinate-blocking-y-sort-system.md
      - design/gdd/click-movement-system.md
    variables:
      - bounds_valid
      - in_bounds
      - terrain_actor_passable
      - target_occupied_by_other_actor
      - target_reserved_by_other_actor
    output_range: [false, true]
    expression: "bounds_valid AND in_bounds AND terrain_actor_passable AND NOT target_occupied_by_other_actor AND NOT target_reserved_by_other_actor"
    notes: "Determines whether a blocking actor may enter or reserve a target logical cell; dropped items do not block actor movement in MVP."
    added: 2026-06-03
    revised: "2026-06-03"

  - name: item_placeable
