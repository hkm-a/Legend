name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  godot-gdscript-tests:
    name: Godot GDScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.6.3
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false

      - name: Run Godot test guard
        working-directory: ${{ github.workspace }}
        run: |
          godot --headless --path GodotMirClient --script ../tests/gdunit4_runner.gd
